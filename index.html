<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d3152">
  <meta name="description" content="PCSAPO マキシ企画 飲食店導入パッケージ営業支援システム">
  <title>飲食店導入パッケージ | PCSAPO マキシ企画</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/css/style.css?v=19">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><span class="brand-mark">P</span><div><b>PCSAPO</b><small>マキシ企画</small></div></div>
      <button class="new-case" id="newCase">＋ 新規案件</button>
      <nav id="mainNav" aria-label="メインメニュー"></nav>
      <div class="side-footer"><span id="saveState">未保存</span><small>端末内の最新10件を保存</small></div>
    </aside>
    <button class="sidebar-backdrop" id="sidebarBackdrop" aria-label="メニューを閉じる" hidden></button>

    <div class="main-wrap">
      <header class="topbar">
        <button class="icon-button menu-button" id="menuButton" aria-label="メニューを開く" aria-expanded="false">☰</button>
        <div class="case-title"><span class="status-dot"></span><input id="caseName" aria-label="案件名" value="新規導入案件"></div>
        <div class="top-actions">
          <button class="button ghost" id="modeButton">入口へ</button>
          <button class="button ghost" id="caseListButton">案件一覧</button>
          <button class="button ghost" id="shareButton">共有</button>
          <button class="button primary" id="saveButton">保存</button>
        </div>
      </header>

      <main id="content" tabindex="-1"></main>
    </div>
  </div>

  <dialog id="caseDialog">
    <div class="dialog-head"><div><small>CASE STORAGE</small><h2>案件一覧</h2></div><button class="icon-button" data-close>×</button></div>
    <section class="storage-panel">
      <div><b>現在の保存先</b><span>この端末（最新10件）</span></div>
      <label class="storage-choice active"><input type="radio" name="storageMode" checked><span><b>端末内保存</b><small>すぐ使える・最新10件</small></span></label>
      <label class="storage-choice"><input type="radio" name="storageMode" disabled><span><b>Google Cloud</b><small>複数端末共有・今後対応予定</small></span></label>
    </section>
    <p class="storage-note">最新10件を超える場合は、整理前に全案件のJSONバックアップを自動保存します。</p>
    <div class="dialog-tools"><button class="button primary" id="exportBackup">JSONバックアップ</button><label class="button ghost">JSON復元<input hidden type="file" id="importBackup" accept=".json,application/json"></label><button class="button ghost" id="exportCsv">CSV出力</button><label class="button ghost">CSV取込<input hidden type="file" id="importCsv" accept=".csv,text/csv"></label></div>
    <div class="case-count" id="caseCount"></div>
    <div id="caseList" class="case-list"></div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-head"><div><small>SHARE</small><h2>案件を共有</h2></div><button class="icon-button" data-close>×</button></div>
    <p class="muted">PDF保存は「PDF・印刷」を開き、印刷画面でPDF保存を選択してください。</p>
    <div class="share-grid"><button class="button primary" id="nativeShare">端末の共有メニュー</button><button class="button line" id="lineShare">LINEで共有</button><button class="button ghost" id="mailShare">メールで共有</button></div>
  </dialog>

  <dialog id="adminDialog">
    <div class="dialog-head"><div><small>ADMIN ACCESS</small><h2 id="adminDialogTitle">管理者用を開く</h2></div><button class="icon-button" data-close>×</button></div>
    <p class="muted" id="adminDialogHelp">この端末に設定した簡易パスコードを入力してください。</p>
    <div class="field"><label for="adminPasscode">パスコード</label><input id="adminPasscode" type="password" inputmode="numeric" autocomplete="current-password" minlength="4" maxlength="12"></div>
    <div class="field" id="adminPasscodeConfirmWrap" hidden><label for="adminPasscodeConfirm">パスコード確認</label><input id="adminPasscodeConfirm" type="password" inputmode="numeric" autocomplete="new-password" minlength="4" maxlength="12"></div>
    <div class="dialog-tools"><button class="button primary" id="adminLoginButton">管理者用を開く</button></div>
    <p class="storage-note">これは共有端末での誤操作を防ぐ簡易ロックです。サーバー認証ではありません。</p>
  </dialog>

  <div class="toast" id="toast" role="status"></div>
  <script src="assets/js/app.js?v=19" defer></script>
</body>
</html>
