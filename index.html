<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d3152">
  <meta name="description" content="PCSAPO マキシ企画 飲食店導入パッケージ営業支援システム">
  <title>飲食店導入パッケージ | PCSAPO マキシ企画</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><span class="brand-mark">P</span><div><b>PCSAPO</b><small>マキシ企画</small></div></div>
      <button class="new-case" id="newCase">＋ 新規案件</button>
      <nav id="mainNav" aria-label="メインメニュー"></nav>
      <div class="side-footer"><span id="saveState">未保存</span><small>端末内に安全に保存</small></div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <button class="icon-button menu-button" id="menuButton" aria-label="メニューを開く">☰</button>
        <div class="case-title"><span class="status-dot"></span><input id="caseName" aria-label="案件名" value="新規導入案件"></div>
        <div class="top-actions">
          <button class="button ghost" id="caseListButton">案件一覧</button>
          <button class="button ghost" id="shareButton">共有</button>
          <button class="button primary" id="saveButton">保存</button>
        </div>
      </header>

      <main id="content" tabindex="-1"></main>
    </div>
  </div>

  <dialog id="caseDialog">
    <div class="dialog-head"><div><small>LOCAL STORAGE</small><h2>案件一覧</h2></div><button class="icon-button" data-close>×</button></div>
    <div class="dialog-tools"><button class="button ghost" id="exportCsv">CSV出力</button><label class="button ghost">CSV取込<input hidden type="file" id="importCsv" accept=".csv,text/csv"></label></div>
    <div id="caseList" class="case-list"></div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-head"><div><small>SHARE</small><h2>案件を共有</h2></div><button class="icon-button" data-close>×</button></div>
    <p class="muted">PDF保存は「PDF・印刷」を開き、印刷画面でPDF保存を選択してください。</p>
    <div class="share-grid"><button class="button primary" id="nativeShare">端末の共有メニュー</button><button class="button line" id="lineShare">LINEで共有</button><button class="button ghost" id="mailShare">メールで共有</button></div>
  </dialog>

  <div class="toast" id="toast" role="status"></div>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
